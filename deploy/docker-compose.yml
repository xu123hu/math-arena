# Math Arena - Docker Compose Dev Environment
# Usage: docker compose -f deploy/docker-compose.yml up -d

services:
  # ==================== Infrastructure ====================

  postgres:
    image: pgvector/pgvector:pg15
    container_name: math-arena-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: math_arena
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: math-arena-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Application Services ====================

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: math-arena-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/math_arena
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: math-arena-web
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../packages:/app/packages
    command: pnpm --filter @math-arena/web dev

volumes:
  pgdata:
  redisdata:
