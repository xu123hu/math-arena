# Math Arena - Docker Compose 开发环境
# 使用方式：docker compose -f deploy/docker-compose.yml up -d

services:
  # ==================== 基础设施 ====================

  postgres:
    image: pgvector/pgvector:pg15
    container_name: math-arena-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: math_arena
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: math-arena-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 应用服务 ====================

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: math-arena-api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: math-arena-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    command: pnpm dev --host

  # ==================== AI 服务（M2 本地部署） ====================
